    .grocery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }
    .grocery-progress-bar { margin-bottom: 28px; }
    .reset-bar {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
      background: white; border: 1px solid var(--gray-200); border-radius: var(--border-radius);
      padding: 14px 20px; margin-bottom: 24px; box-shadow: var(--shadow-sm);
    }
    .reset-bar-left { display: flex; align-items: center; gap: 14px; }
    .grocery-check-count { font-size: 0.9375rem; font-weight: 600; color: var(--text-light); }
    .grocery-check-count strong { color: var(--teal); font-size: 1.0625rem; }
  </style>
</head>

<div class="page-container">
  <div class="page-header">

  </div>

  <!-- PROGRESS + RESET BAR -->
  <div class="reset-bar">
    <div class="reset-bar-left">
      <span class="grocery-check-count"><strong id="checkedCount">0</strong> of <strong id="totalCount">0</strong> items checked</span>
      <div style="width:160px">
        <div class="progress-track" style="height:9px">

<script src="sync.js"></script>

    ]

const STORAGE_KEY = 'wellness_grocery';

function loadChecked() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
function saveChecked(obj) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
  if (window.GS) GS.post('Grocery', obj);
}

function getItemKey(catIdx, itemIdx) { return `c${catIdx}_i${itemIdx}`; }

function render() {
  const checked = loadChecked();
  const grid    = document.getElementById('groceryGrid');
  grid.innerHTML = '';

  let totalItems   = 0;
  let checkedItems = 0;

  CATEGORIES.forEach((cat, ci) => {
    totalItems += cat.items.length;

    const catDiv = document.createElement('div');
    catDiv.className = 'grocery-category';

    const catCheckedCount = cat.items.filter((_,ii) => checked[getItemKey(ci,ii)]).length;
    checkedItems += catCheckedCount;

    catDiv.innerHTML = `
      <div class="grocery-cat-head">
        <span>${cat.icon}</span>
        <span>${cat.name}</span>
        <span style="margin-left:auto;opacity:0.8;font-size:0.8125rem">${catCheckedCount}/${cat.items.length}</span>
      </div>
      <div class="grocery-items" id="catItems-${ci}"></div>
    `;

    grid.appendChild(catDiv);

    const itemsContainer = document.getElementById('catItems-'+ci);
    cat.items.forEach((item, ii) => {
      const key     = getItemKey(ci, ii);
      const isChecked = checked[key] || false;

      const itemDiv = document.createElement('label');
      itemDiv.className = 'grocery-item' + (isChecked ? ' g-checked' : '');
      itemDiv.innerHTML = `
        <input type="checkbox" ${isChecked ? 'checked' : ''}>
        <div style="flex:1;min-width:0">
          <div class="grocery-item-name">${item.name}</div>
          <div class="grocery-item-brand">✓ ${item.brand}</div>
        </div>
      `;

      const cb = itemDiv.querySelector('input');
      cb.addEventListener('change', e => {
        const c = loadChecked();
        if (e.target.checked) c[key] = true;
        else delete c[key];
        saveChecked(c);
        render();
      });

      itemsContainer.appendChild(itemDiv);
    });
  });

  // Update progress
  document.getElementById('checkedCount').textContent = checkedItems;
  document.getElementById('totalCount').textContent   = totalItems;
  document.getElementById('groceryProgressFill').style.width = (totalItems ? checkedItems/totalItems*100 : 0) + '%';
}

function resetList() {
  if (!confirm('Uncheck all grocery items? Great for a fresh shopping trip!')) return;
  localStorage.removeItem(STORAGE_KEY);
  render();
}

document.getElementById('navToggle').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});

render();

// ─── CLOUD SYNC LOAD ──────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  if (!window.GS) return;
  const cloud = await GS.get('Grocery');
  if (!cloud || typeof cloud !== 'object') return;
  const local = loadChecked();
  if (JSON.stringify(cloud) !== JSON.stringify(local)) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cloud));
    render();
  }
});
</script>
