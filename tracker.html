<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wellness Journey — Week 1 Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .day-panel { display: none; }
    .day-panel.active { display: block; }

    .day-header-strip {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
      background: var(--teal-light); border-radius: 10px; padding: 14px 18px; margin-bottom: 20px;
      border: 1px solid rgba(29,158,117,0.2);
    }
    .day-header-left h2 { font-size: 1.25rem; font-weight: 800; color: var(--teal-dark); }
    .day-header-left p  { font-size: 0.875rem; color: var(--text-light); margin-top: 2px; }
    .day-complete-badge { background: var(--teal); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.8125rem; font-weight: 700; display: none; }
    .day-complete-badge.show { display: inline-flex; align-items: center; gap: 6px; }

    .day-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .meals-section { grid-column: 1; }
    .sidebar-section { grid-column: 2; display: flex; flex-direction: column; gap: 16px; }

    .section-label {
      font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--text-light); margin-bottom: 10px;
    }

    .daily-stats-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .daily-stat {
      flex: 1; background: white; border: 1px solid var(--gray-200);
      border-radius: 9px; padding: 12px 14px; text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .daily-stat .dsv { font-size: 1.5rem; font-weight: 800; color: var(--teal); letter-spacing: -0.03em; }
    .daily-stat .dsl { font-size: 0.7rem; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
    .daily-stat.ds-purple .dsv { color: var(--purple); }

    @media (max-width: 768px) {
      .day-grid { grid-template-columns: 1fr; }
      .meals-section { grid-column: 1; }
      .sidebar-section { grid-column: 1; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">🌿 My Wellness Journey</a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M3 11h16M3 6h16M3 16h16"/>
      </svg>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="tracker.html" class="active">Week 1 Tracker</a></li>
      <li><a href="meals.html">Meal Plan</a></li>
      <li><a href="progress.html">Progress</a></li>
      <li><a href="grocery.html">Grocery List</a></li>
      <li><a href="supplements.html">Supplements</a></li>
    </ul>
  </div>
</nav>

<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Week 1 Tracker</h1>
    <p class="page-subtitle">Monday March 30 – Sunday April 5 &nbsp;·&nbsp; Check off each meal and workout as you go</p>
  </div>

  <!-- DAY TABS -->
  <div class="tab-list" id="tabList" role="tablist"></div>

  <!-- DAY PANELS (generated by JS) -->
  <div id="dayPanels"></div>

</div>

<script src="sync.js"></script>
<script>
const WEEK = [
  { day:'Monday',    date:'Mar 30', short:'Mon\nMar 30', hasOT:true,  otTime:'7:30am',  loc:'WFH',
    meals:[
      {n:'Breakfast',    f:'Besan ke chille 2 + mint chutney',           p:14},
      {n:'Protein Shake',f:'Premier Protein cafe latte',                  p:30},
      {n:'Lunch',        f:'Lentil soup + whole wheat pita',              p:18},
      {n:'Snack',        f:'Apple + almond butter',                       p:7},
      {n:'Dinner',       f:'Paneer tikka wrap + raita',                   p:28},
    ],
    tip:'Day 1 and also your meal prep day — spend 2 hours doing Sunday batch cook to set up the whole week.'
  },
  { day:'Tuesday',   date:'Mar 31', short:'Tue\nMar 31', hasOT:true,  otTime:'4:30pm',  loc:'Office',
    meals:[
      {n:'Breakfast',    f:'Overnight oats jar packed',                   p:22},
      {n:'Protein Shake',f:'Premier Protein cafe latte',                  p:30},
      {n:'Lunch',        f:'Quinoa veggie bowl packed',                   p:22},
      {n:'Snack',        f:'Cottage cheese + cucumber packed',            p:14},
      {n:'Dinner',       f:'Dal tadka + brown rice + roti',               p:18},
    ],
    tip:'Grab your overnight oats jar and lunch box from the fridge before you leave. Eat your snack before Orangetheory.'
  },
  { day:'Wednesday', date:'Apr 1',  short:'Wed\nApr 1',  hasOT:true,  otTime:'4:30pm',  loc:'Office',
    meals:[
      {n:'Breakfast',    f:'Besan ke chille 2 packed from Sunday batch',  p:14},
      {n:'Protein Shake',f:'Premier Protein cafe latte',                  p:30},
      {n:'Lunch',        f:'Quinoa veggie bowl packed',                   p:22},
      {n:'Snack',        f:'Hummus + veggie sticks packed',               p:5},
      {n:'Dinner',       f:'Pasta with tomato-lentil sauce',              p:22},
    ],
    tip:'Microwave chilles 45 seconds at office. Hummus snack today keeps it varied.'
  },
  { day:'Thursday',  date:'Apr 2',  short:'Thu\nApr 2',  hasOT:true,  otTime:'4:30pm',  loc:'Office',
    meals:[
      {n:'Breakfast',    f:'Overnight oats jar packed',                   p:22},
      {n:'Protein Shake',f:'Premier Protein cafe latte',                  p:30},
      {n:'Lunch',        f:'Quinoa veggie bowl packed',                   p:22},
      {n:'Snack',        f:'Cottage cheese + cucumber packed',            p:14},
      {n:'Dinner',       f:'Stuffed aloo paratha + yogurt',               p:18},
    ],
    tip:"Last office day and final packed quinoa bowl. Tonight's paratha is the most comforting dinner of the week."
  },
  { day:'Friday',    date:'Apr 3',  short:'Fri\nApr 3',  hasOT:true,  otTime:'7:30am',  loc:'WFH',
    meals:[
      {n:'Breakfast',    f:'Smoothie bowl — yogurt + berries + granola',  p:20},
      {n:'Protein Shake',f:'Premier Protein cafe latte',                  p:30},
      {n:'Lunch',        f:'Leftover dal + rice or lentil soup',          p:18},
      {n:'Snack',        f:'Banana + handful of almonds',                 p:6},
      {n:'Dinner',       f:'Black bean veggie burger wrap',               p:20},
    ],
    tip:'5th OT session of the week — incredible consistency. Treat dinner tonight, you earned it.'
  },
  { day:'Saturday',  date:'Apr 4',  short:'Sat\nApr 4',  hasOT:false, loc:'Weekend — Flexible',
    meals:[
      {n:'Breakfast',    f:'Besan ke chille fresh + chai',                p:14},
      {n:'Protein Shake',f:'Premier Protein cafe latte (optional)',       p:0, opt:true, optP:30},
      {n:'Lunch',        f:'Eat out smart — Mediterranean or Indian',     p:15},
      {n:'Snack',        f:'Greek yogurt + berries + granola',            p:18},
      {n:'Dinner',       f:'Homemade pizza or 1 treat meal out',          p:15},
    ],
    tip:'Enjoy your weekend. One treat meal is built in — have it guilt free.'
  },
  { day:'Sunday',    date:'Apr 5',  short:'Sun\nApr 5',  hasOT:false, loc:'Weekend — Meal Prep Day',
    meals:[
      {n:'Breakfast',    f:'Masala oats or overnight oats',               p:18},
      {n:'Protein Shake',f:'Premier Protein cafe latte (optional)',       p:0, opt:true, optP:30},
      {n:'Lunch',        f:'Light wrap or leftovers',                     p:14},
      {n:'Snack',        f:'Fruit + mixed nuts',                          p:6},
      {n:'Dinner',       f:'Warm grain bowl — quinoa + roasted veggies + feta', p:20},
    ],
    tip:'End of Week 1! Weigh yourself Sunday morning April 6 before eating for your official check-in.'
  },
];

const MEAL_ICONS = ['🥣','🥤','🥗','🍎','🍽️'];

// ─── STATE ───────────────────────────────────────────────────────────────
function loadDay(d)   { return JSON.parse(localStorage.getItem('wellness_tracker_day_'+d) || '{}'); }
function saveDay(d,s) {
  localStorage.setItem('wellness_tracker_day_'+d, JSON.stringify(s));
  _pushTrackerCloud();
}

function _pushTrackerCloud() {
  if (!window.GS) return;
  const all = {};
  for (let i = 0; i < 7; i++) all['day'+i] = getDayState(i);
  GS.post('Tracker', all);
}

function getDayState(d) {
  const s = loadDay(d);
  return {
    meals:  s.meals  || [false,false,false,false,false],
    ot:     s.ot     || false,
    notes:  s.notes  || '',
  };
}

// ─── RENDER ──────────────────────────────────────────────────────────────
function buildTabs() {
  const tl = document.getElementById('tabList');
  WEEK.forEach((day, d) => {
    const state = getDayState(d);
    const done  = state.meals.every(Boolean);
    const parts = day.short.split('\n');
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (d===0?' active':'') + (done?' tab-done':'');
    btn.setAttribute('role','tab');
    btn.setAttribute('aria-selected', d===0?'true':'false');
    btn.dataset.day = d;
    btn.innerHTML = `<span class="tab-day">${parts[0]}</span><span class="tab-date">${parts[1]}</span>${done?'<span class="tab-done-dot"></span>':''}`;
    btn.addEventListener('click', () => switchDay(d));
    tl.appendChild(btn);
  });
}

function buildPanels() {
  const container = document.getElementById('dayPanels');
  WEEK.forEach((day, d) => {
    const state = getDayState(d);
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (d===0?' active':'');
    panel.id = 'panel-'+d;

    // Protein target (sum of all non-optional proteins)
    const proteinTarget = day.meals.reduce((s,m) => s + (m.opt?0:m.p), 0);

    panel.innerHTML = `
      <div class="day-header-strip">
        <div class="day-header-left">
          <h2>${day.day}, ${day.date}</h2>
          <p>${day.loc}${day.hasOT ? ' &nbsp;·&nbsp; 🔥 OT @ '+day.otTime : ''}</p>
        </div>
        <span class="day-complete-badge${state.meals.every(Boolean)?' show':''}" id="doneBadge-${d}">✅ Day Complete!</span>
      </div>

      <div class="daily-stats-row">
        <div class="daily-stat">
          <div class="dsv" id="mealCount-${d}">${state.meals.filter(Boolean).length}</div>
          <div class="dsl">Meals ✓</div>
        </div>
        <div class="daily-stat ds-purple">
          <div class="dsv" id="proteinCount-${d}">${calcProtein(day, state.meals)}g</div>
          <div class="dsl">Protein</div>
        </div>
      </div>

      <div class="day-grid">
        <div class="meals-section">
          <div class="section-label">Meals &amp; Nutrition</div>
          <div id="mealRows-${d}"></div>
          ${day.hasOT ? `
          <div style="margin-top:14px">
            <div class="section-label">Workout</div>
            <label class="toggle-wrap" id="otWrap-${d}">
              <div class="toggle">
                <input type="checkbox" id="otToggle-${d}" ${state.ot?'checked':''}>
                <span class="toggle-slider"></span>
              </div>
              <span class="toggle-label">🔥 Orangetheory @ ${day.otTime} done!</span>
            </label>
          </div>` : ''}
        </div>

        <div class="sidebar-section">
          <div class="card">
            <div class="card-body" style="padding:16px">
              <div class="section-label" style="margin-bottom:8px">Daily Progress</div>
              <div class="progress-wrap">
                <div class="progress-label">
                  <span>Meals</span>
                  <span id="mealBar-${d}-lbl">${state.meals.filter(Boolean).length} / 5</span>
                </div>
                <div class="progress-track">
                  <div class="progress-fill" id="mealBar-${d}" style="width:${state.meals.filter(Boolean).length/5*100}%"></div>
                </div>
              </div>
              <div class="progress-wrap" style="margin-top:8px">
                <div class="progress-label">
                  <span>Protein</span>
                  <span id="proteinBar-${d}-lbl">${calcProtein(day,state.meals)}g / ${proteinTarget}g</span>
                </div>
                <div class="progress-track">
                  <div class="progress-fill p-purple" id="proteinBar-${d}" style="width:${Math.min(100,calcProtein(day,state.meals)/proteinTarget*100)}%"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-body" style="padding:16px">
              <div class="section-label" style="margin-bottom:8px">Notes</div>
              <textarea class="form-control" id="notes-${d}" placeholder="How did today feel? Any substitutions?" style="min-height:90px">${state.notes}</textarea>
            </div>
          </div>

          <div class="tip-box">
            <div class="tip-box-label">💡 Today's Tip</div>
            <p>${day.tip}</p>
          </div>
        </div>
      </div>
    `;
    container.appendChild(panel);

    // Render meal rows
    renderMealRows(d, state.meals);

    // OT toggle listener
    if (day.hasOT) {
      document.getElementById('otToggle-'+d).addEventListener('change', e => {
        const s = getDayState(d);
        s.ot = e.target.checked;
        saveDay(d, s);
      });
    }

    // Notes listener
    document.getElementById('notes-'+d).addEventListener('input', e => {
      const s = getDayState(d);
      s.notes = e.target.value;
      saveDay(d, s);
    });
  });
}

function renderMealRows(d, mealChecked) {
  const day = WEEK[d];
  const container = document.getElementById('mealRows-'+d);
  container.innerHTML = '';
  day.meals.forEach((meal, i) => {
    const ck = mealChecked[i] || false;
    const lbl = document.createElement('label');
    lbl.className = 'meal-row' + (ck?' is-checked':'');
    lbl.innerHTML = `
      <input type="checkbox" ${ck?'checked':''}>
      <div class="meal-info">
        <div class="meal-type">${MEAL_ICONS[i]} ${meal.n}</div>
        <div class="meal-food">${meal.f}</div>
      </div>
      <span class="protein-pill${meal.opt?' optional':''}">${meal.opt && !ck ? '0–'+meal.optP : meal.p}g</span>
    `;
    const cb = lbl.querySelector('input');
    cb.addEventListener('change', e => toggleMeal(d, i, e.target.checked));
    container.appendChild(lbl);
  });
}

function toggleMeal(d, mealIdx, checked) {
  const s = getDayState(d);
  s.meals[mealIdx] = checked;
  saveDay(d, s);
  updateDayUI(d, s.meals);
}

function calcProtein(day, mealChecked) {
  return day.meals.reduce((sum, m, i) => {
    if (m.opt) return sum + (mealChecked[i] ? (m.optP||30) : 0);
    return sum + (mealChecked[i] ? m.p : 0);
  }, 0);
}

function updateDayUI(d, mealChecked) {
  const day = WEEK[d];
  const count = mealChecked.filter(Boolean).length;
  const protein = calcProtein(day, mealChecked);
  const proteinTarget = day.meals.reduce((s,m) => s + (m.opt?0:m.p), 0);
  const allDone = count === 5;

  // Re-render rows
  renderMealRows(d, mealChecked);

  // Stats
  document.getElementById('mealCount-'+d).textContent   = count;
  document.getElementById('proteinCount-'+d).textContent = protein+'g';

  // Bars
  document.getElementById('mealBar-'+d).style.width     = (count/5*100)+'%';
  document.getElementById('mealBar-'+d+'-lbl').textContent = count+' / 5';
  document.getElementById('proteinBar-'+d).style.width  = Math.min(100, protein/proteinTarget*100)+'%';
  document.getElementById('proteinBar-'+d+'-lbl').textContent = protein+'g / '+proteinTarget+'g';

  // Complete badge
  const badge = document.getElementById('doneBadge-'+d);
  badge.classList.toggle('show', allDone);

  // Tab dot
  const tab = document.querySelector('[data-day="'+d+'"]');
  if (tab) {
    tab.classList.toggle('tab-done', allDone);
    const existing = tab.querySelector('.tab-done-dot');
    if (allDone && !existing) {
      const dot = document.createElement('span');
      dot.className = 'tab-done-dot';
      tab.appendChild(dot);
    } else if (!allDone && existing) {
      existing.remove();
    }
  }
}

function switchDay(d) {
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-selected','false');
  });
  document.getElementById('panel-'+d).classList.add('active');
  const tab = document.querySelector('[data-day="'+d+'"]');
  tab.classList.add('active');
  tab.setAttribute('aria-selected','true');
}

// ─── INIT ─────────────────────────────────────────────────────────────────
document.getElementById('navToggle').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});

buildTabs();
buildPanels();

// ─── CLOUD SYNC LOAD ──────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  if (!window.GS) return;
  const cloud = await GS.get('Tracker');
  if (!cloud || typeof cloud !== 'object') return;
  let changed = false;
  for (let i = 0; i < 7; i++) {
    const key = 'day' + i;
    if (!cloud[key]) continue;
    const local = getDayState(i);
    if (JSON.stringify(cloud[key]) !== JSON.stringify(local)) {
      localStorage.setItem('wellness_tracker_day_' + i, JSON.stringify(cloud[key]));
      changed = true;
    }
  }
  if (!changed) return;
  // Refresh UI for all 7 days
  for (let i = 0; i < 7; i++) {
    const s = getDayState(i);
    updateDayUI(i, s.meals);
    if (WEEK[i].hasOT) {
      const ot = document.getElementById('otToggle-' + i);
      if (ot) ot.checked = s.ot;
    }
    const notes = document.getElementById('notes-' + i);
    if (notes) notes.value = s.notes;
  }
});

// Open today's tab if within the week
(function() {
  const DATES = ['03-30','03-31','04-01','04-02','04-03','04-04','04-05'];
  const now   = new Date();
  const md    = (now.getMonth()+1+'').padStart(2,'0') + '-' + (now.getDate()+'').padStart(2,'0');
  const idx   = DATES.indexOf(md);
  if (idx !== -1) switchDay(idx);
})();
</script>
</body>
</html>
